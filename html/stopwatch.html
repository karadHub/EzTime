<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Timer - Stopwatch</title>
    <link rel="shortcut icon" href="../images/timer-icon.svg">
    <link rel="stylesheet" href="../assets/main.css">
    <link rel="stylesheet" href="../assets/sidebar.css">
</head>

<body>
    <div class="header">
        <div id="sidebarMenu"></div>
    </div>
    <div class="glass-container">
        <header>
            <h1>Stopwatch</h1>
        </header>
        <table>
            <tr id="timer">
                <td><span id="stopwatch_main"><strong>00:00,00</strong></span></td>
            </tr>
            <tr id="controls">
                <td>
                    <input id="start_button" type="button" value="Start" onclick="start()">
                    &nbsp;
                    <input id="stop_button" type="button" value="Stop" onclick="stop()">
                    &nbsp;
                    <input id="reset_button" type="button" value="Reset" onclick="reset()">
                </td>
            </tr>
        </table>
    </div>

    <script src="../assets/stopwatch.js"></script>
</body>

</html>
