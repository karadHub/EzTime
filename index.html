<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzTime</title>
    <link rel="icon" type="image/svg+xml" href="images/timer-icon.svg">
    <link rel="alternate icon" href="images/timer-icon.svg">
    <link rel="stylesheet" href="assets/main.css">
</head>

<body>
    <div class="main-container">
        <div class="header">
            <span id="headerText">EzTime by <a href="https://github.com/karadhub" target="_blank"
                    rel="noopener">karadhub</a></span>
            <nav class="top-nav">
                <a href="#" id="nav-countdown">Countdown Timer</a>
                <a href="#" id="nav-stopwatch">Stopwatch</a>
                <a href="https://github.com/karadhub/easytimer" target="_blank" rel="noopener" class="github-link">
                    <img src="images/github-icon.svg" alt="GitHub" class="github-icon">
                    <span class="github-text">Source Code</span>
                </a>
            </nav>
            <div class="hamburger-menu">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <div id="countdown-timer-section" class="timer-section">
            <div class="glass-container">
                <h1 class="timer-title">Countdown Timer</h1>
                <div class="timer-display">
                    <span id="timer_main">00:00:00</span>
                </div>
                <div class="presets">
                    <button class="preset-btn" data-hours="0" data-minutes="25"
                        data-seconds="0">Pomodoro<br><small>25m</small></button>
                    <button class="preset-btn" data-hours="0" data-minutes="5" data-seconds="0">Short
                        Break<br><small>5m</small></button>
                    <button class="preset-btn" data-hours="0" data-minutes="15" data-seconds="0">Long
                        Break<br><small>15m</small></button>
                    <button class="preset-btn" data-hours="0" data-minutes="30"
                        data-seconds="0">Workout<br><small>30m</small></button>
                    <button class="preset-btn" data-hours="0" data-minutes="1"
                        data-seconds="0">Quick<br><small>1m</small></button>
                </div>
                <div class="save-preset-container">
                    <button id="save-preset-btn">Save Current as Preset</button>
                    <div id="custom-presets"></div>
                </div>
                <div class="custom-time-setter">
                    <span class="countdown-label">Count down</span>
                    <div class="time-inputs">
                        <div class="time-input-group">
                            <input id="hour_input" type="text" value="00" maxlength="2" aria-label="Hours">
                            <span>h</span>
                        </div>
                        <div class="time-input-group">
                            <input id="min_input" type="text" value="00" maxlength="2" aria-label="Minutes">
                            <span>m</span>
                        </div>
                        <div class="time-input-group">
                            <input id="sec_input" type="text" value="00" maxlength="2" aria-label="Seconds">
                            <span>s</span>
                        </div>
                    </div>
                    <button id="set_button" onclick="setTime()">Set Time</button>
                </div>
                <div class="controls">
                    <button id="start_button_countdown" onclick="start()">Start</button>
                    <button id="pause_button" onclick="pause()">Pause</button>
                    <button id="reset_button_countdown" onclick="reset()">Reset</button>
                </div>
            </div>
        </div>

        <div id="stopwatch-section" class="timer-section">
            <div class="glass-container">
                <h1 class="timer-title">Stopwatch</h1>
                <div class="timer-display">
                    <span id="stopwatch_main">00:00:00</span>
                </div>
                <div class="controls">
                    <button id="start_button_stopwatch" onclick="startStopwatch()">Start</button>
                    <button id="stop_button" onclick="stopStopwatch()">Stop</button>
                    <button id="reset_button_stopwatch" onclick="resetStopwatch()">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/countdown_timer.js"></script>
    <script src="assets/stopwatch.js"></script>
    <script src="assets/app.js"></script>
</body>

</html>
